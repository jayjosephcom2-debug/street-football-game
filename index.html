<!DOCTYPE html>
<html>
<head>
<title>Street Football Final</title>
<style>
body { margin:0; background:#0f172a; overflow:hidden; }
canvas { display:block; margin:auto; background:#1e293b; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 1000;
canvas.height = 600;

// GAME STATE
let scoreA=0, scoreB=0, time=180;
let keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// BALL
let ball = { x:500, y:300, vx:0, vy:0, r:10 };
let ballOwner = null;

// PLAYER
function createPlayer(x,y,color,ai=false){
  return { x,y,color,ai,speed:2.5,frozen:false };
}

// TEAMS
let teamA = [
  createPlayer(200,200,"cyan"),
  createPlayer(200,400,"cyan"),
  createPlayer(300,300,"cyan")
];

let teamB = [
  createPlayer(800,200,"red",true),
  createPlayer(800,400,"red",true),
  createPlayer(700,300,"red",true)
];

let currentPlayer = 0;

// SWITCH PLAYER
document.addEventListener("keydown",e=>{
  if(e.key==="Tab"){
    e.preventDefault();
    currentPlayer = (currentPlayer+1)%3;
  }
});

// POWERUPS
let powerups = [];
setInterval(()=>{
  const types=["speed","freeze","power"];
  powerups.push({
    x:Math.random()*900+50,
    y:Math.random()*500+50,
    type:types[Math.floor(Math.random()*3)]
  });
},5000);

// POSSESSION SYSTEM
function checkPossession(){
  if(ballOwner) return;

  [...teamA,...teamB].forEach(p=>{
    let dist = Math.hypot(ball.x-p.x, ball.y-p.y);
    if(dist<20 && !ballOwner){
      ballOwner = p;
    }
  });
}

// BALL UPDATE
function updateBall(){
  if(ballOwner){
    ball.x = ballOwner.x;
    ball.y = ballOwner.y;
  } else {
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.98;
    ball.vy *= 0.98;
  }
}

// CONTROL
function control(p){
  if(p.frozen) return;

  let speed = keys["Shift"] ? 4 : 2.5;

  if(keys["w"]) p.y -= speed;
  if(keys["s"]) p.y += speed;
  if(keys["a"]) p.x -= speed;
  if(keys["d"]) p.x += speed;

  if(keys[" "] && ballOwner===p){
    shoot(p);
  }

  if(keys["e"] && ballOwner===p){
    pass(p);
  }
}

// SHOOT
function shoot(p){
  ballOwner=null;
  ball.vx = (Math.random()*2-1)*8;
  ball.vy = (Math.random()*2-1)*8;
}

// PASS
function pass(p){
  let mate = teamA.find(pl=>pl!==p);
  if(mate){
    ballOwner=null;
    ball.vx = (mate.x-p.x)*0.2;
    ball.vy = (mate.y-p.y)*0.2;
  }
}

// AI
function ai(p){
  if(p.frozen) return;

  let dx = ball.x - p.x;
  let dy = ball.y - p.y;

  p.x += dx*0.008;
  p.y += dy*0.008;

  if(ballOwner===p){
    ballOwner=null;
    ball.vx = -dx*0.5;
    ball.vy = -dy*0.5;
  }
}

// POWERUPS
function applyPower(type){
  let p = teamA[currentPlayer];

  if(type==="speed"){
    p.speed=5;
    setTimeout(()=>p.speed=2.5,3000);
  }

  if(type==="freeze"){
    teamB.forEach(e=>{
      e.frozen=true;
      setTimeout(()=>e.frozen=false,2000);
    });
  }

  if(type==="power"){
    if(ballOwner===p){
      shoot(p);
    }
  }
}

// UPDATE
function update(){

  control(teamA[currentPlayer]);
  teamB.forEach(ai);

  checkPossession();
  updateBall();

  // WALLS
  if(ball.x<0||ball.x>canvas.width) ball.vx*=-1;
  if(ball.y<0||ball.y>canvas.height) ball.vy*=-1;

  // GOALS
  if(ball.x<10 && ball.y>250 && ball.y<350){
    scoreB++; reset();
  }
  if(ball.x>990 && ball.y>250 && ball.y<350){
    scoreA++; reset();
  }

  // POWERUPS
  powerups.forEach((p,i)=>{
    let d=Math.hypot(ball.x-p.x, ball.y-p.y);
    if(d<20){
      applyPower(p.type);
      powerups.splice(i,1);
    }
  });
}

// RESET
function reset(){
  ball.x=500; ball.y=300;
  ballOwner=null;
  ball.vx=ball.vy=0;
}

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#1e293b";
  ctx.fillRect(0,0,1000,600);

  // GOALS
  ctx.fillStyle="white";
  ctx.fillRect(0,250,10,100);
  ctx.fillRect(990,250,10,100);

  // BALL
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,10,0,Math.PI*2);
  ctx.fillStyle="yellow";
  ctx.fill();

  // PLAYERS
  teamA.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fillStyle = (i===currentPlayer)?"lime":p.color;
    ctx.fill();
  });

  teamB.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  });

  // POWERUPS
  powerups.forEach(p=>{
    ctx.fillStyle = p.type==="speed"?"blue":p.type==="power"?"orange":"purple";
    ctx.fillRect(p.x-8,p.y-8,16,16);
  });

  // UI
  ctx.fillStyle="white";
  ctx.font="22px Arial";
  ctx.fillText(scoreA+" - "+scoreB,470,30);
  ctx.fillText("Time: "+time,450,60);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

setInterval(()=>{
  time--;
  if(time<=0){
    alert("Match Over");
    location.reload();
  }
},1000);

loop();
</script>

</body>
</html>
